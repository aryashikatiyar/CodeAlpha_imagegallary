<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <div class="image nature">
            <img src="https://picsum.photos/id/1015/400/300" alt="">
        </div>

        <div class="image city">
            <img src="https://picsum.photos/id/1011/400/300" alt="">
        </div>

        <div class="image animals">
            <img src="https://picsum.photos/id/1025/400/300" alt="">
        </div>

        <div class="image nature">
            <img src="https://picsum.photos/id/1040/400/300" alt="">
        </div>

        <div class="image city">
            <img src="https://picsum.photos/id/1031/400/300" alt="">
        </div>

        <div class="image animals">
            <img src="https://picsum.photos/id/1062/400/300" alt="">
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>

        <img id="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
